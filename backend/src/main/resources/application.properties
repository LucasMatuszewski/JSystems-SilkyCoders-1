spring.application.name=sinsay-poc

# Dotenv configuration
spring.dotenv.location=../.env
spring.dotenv.ignoreIfMissing=true
spring.dotenv.systemProperties=true
spring.dotenv.overrideSystemProperties=false

# SQLite Database
spring.datasource.url=jdbc:sqlite:./sinsay_poc.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI / OpenRouter
# Try OPENROUTER_API_KEY first, fallback to OPENAI_API_KEY
openai.api-key=${OPENROUTER_API_KEY:}${OPENAI_API_KEY:}
openrouter.api-key=${OPENROUTER_API_KEY:}
openai.base-url=${OPENROUTER_BASE_URL:}${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
openai.model=${OPENROUTER_MODEL:}${OPENAI_MODEL:openai/gpt-4o-mini}

# Policy docs
policy-docs.path=${POLICY_DOCS_PATH:../docs}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
